<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@100..900&display=swap" rel="stylesheet">

  <title>比手畫腳題目產生器</title>

  <style>
    :root {
      --bg-color: #1c1f26;
      --surface: #16181d;
      --text-main: #b3bbcc;
      --text-muted: #576175;
      --border: #53607933;
      --easy: #25855b;
      --medium: #a98c35;
      --hard: #a8506f;
      --reset: #576175;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: "Noto Sans TC", sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      margin: 0;
      padding: 2rem;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 800px;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    h1 {
      margin: 0;
      font-size: 1.5rem;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }

    button {
      padding: 1rem;
      font-size: 1.25rem;
      font-weight: 500;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: white;
      transition: transform 150ms;
      will-change: transform;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    button:hover:not(:disabled) {
      opacity: 0.9;
    }

    button:active:not(:disabled) {
      transform: scale(0.98);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      filter: grayscale(100%);
    }

    .btn-easy {
      background-color: var(--easy);
    }

    .btn-medium {
      background-color: var(--medium);
    }

    .btn-hard {
      background-color: var(--hard);
    }

    .btn-reset {
      background-color: var(--reset);
      width: auto;
      font-size: 1rem;
      padding: 0.5rem 2rem;
      flex-direction: row;
    }

    .count {
      font-size: 0.875rem;
      font-weight: 400;
      background: rgba(0, 0, 0, 0.2);
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
    }

    .display-area {
      background: var(--bg-color);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3rem 2rem;
      text-align: center;
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #question-text {
      font-size: 2rem;
      font-weight: 500;
      margin: 0;
      line-height: 1.4;
    }

    .placeholder {
      color: var(--text-muted);
    }
    
    .history-area {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }

    .history-area h2 {
      margin: 0 0 1rem 0;
      font-size: 1.125rem;
      color: var(--text-muted);
    }

    #history-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    #history-list li {
      background: var(--bg-color);
      border: 1px solid var(--border);
      padding: 0.4rem 0.8rem;
      border-radius: 8px;
      font-size: 0.875rem;
      color: var(--text-main);
    }

    .empty-history {
      color: var(--text-muted);
      font-size: 0.875rem;
    }

    @media (max-width: 650px) {
      body {
        padding: 0.5rem;
      }

      .container {
        padding: 1.5rem;
      }

      .header {
        flex-direction: column;
        gap: 1rem;
        text-align: center;
      }

      .btn-reset {
        width: 100%;
      }

      .controls {
        grid-template-columns: 1fr;
        gap: 0.8rem;
      }

      .display-area {
        padding: 2rem 1rem;
        min-height: 100px;
      }

      #question-text {
        font-size: 1.5rem;
      }

      button {
        flex-direction: row;
        justify-content: center;
        padding: 1rem;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="header">
      <h1>比手畫腳題目產生器</h1>
      <button class="btn-reset" onclick="reset()">重置題目</button>
    </div>

    <div class="controls">
      <button class="btn-easy" id="btn-easy" onclick="pick('easy')">
        簡單 <span class="count" id="count-easy"></span>
      </button>
      <button class="btn-medium" id="btn-medium" onclick="pick('medium')">
        中等 <span class="count" id="count-medium"></span>
      </button>
      <button class="btn-hard" id="btn-hard" onclick="pick('hard')">
        困難 <span class="count" id="count-hard"></span>
      </button>
    </div>

    <div class="display-area">
      <p id="question-text" class="placeholder"></p>
    </div>

    <div class="history-area">
      <h2>歷史紀錄</h2>
      <ul id="history-list">
        <span class="empty-history">尚無紀錄</span>
      </ul>
    </div>
  </div>

  <script>
    const fullPools = {
      easy: [
        "棒球", "籃球", "鋼琴", "電視", "睡覺",
        "刷牙", "開車", "拍照", "洗澡", "唱歌",
        "游泳", "釣魚", "理髮", "讀書", "做飯",
        "掃地" 
      ],
      medium: [
        "樹",    "火山",   "泡麵",   "袋鼠",  
        "警察",   "雨傘",   "蠟燭",   "相機",  
        "冰箱",   "狙擊槍",  "手搖飲",  "太空人", 
        "雲霄飛車", "喝酒",   "化妝",   "騎馬",  
        "衝浪",   "攀岩",   "猜拳",   "打拳擊", 
        "換衣服",  "做實驗",  "動手術"  
      ],
      hard: [
        "瓢蟲",  "壽司",  "黑洞",  "龍捲風",
        "潛水艇", "伺服器", "圖書館", "跳傘", 
        "甩尾",  "寄信",  "結婚",  "修電腦" 
      ]
    };

    let pools = {};
    let history = [];

    function save() {
      localStorage.setItem("questionPools", JSON.stringify(pools));
      localStorage.setItem("questionHistory", JSON.stringify(history));
    }

    function load() {
      return {
        pools: localStorage.getItem("questionPools"),
        history: localStorage.getItem("questionHistory")
      };
    }

    const displayEl = document.getElementById("question-text");
    const historyListEl = document.getElementById("history-list");

    function showPlaceholder() {
      displayEl.textContent = "點選難度以產生題目";
      displayEl.classList.add("placeholder");
    }

    function showQuestion(text) {
      displayEl.textContent = text;
      displayEl.classList.remove("placeholder");
    }

    function refreshButtonText(diff) {
      if (!diff) {
        ["easy", "medium", "hard"].forEach(refreshButtonText);
        return;
      }

      const count = pools[diff].length;
      
      const btn = document.getElementById(`btn-${diff}`);
      const countBadge = document.getElementById(`count-${diff}`);

      countBadge.textContent = `剩餘 ${count} 題`;

      if (count === 0) {
        btn.disabled = true;
      } 
      else {
        btn.disabled = false;
      }
    }

    function clearHistoryUI() {
      historyListEl.innerHTML = "";

      const span = document.createElement("span");
      span.className = "empty-history";
      span.textContent = "尚無紀錄";
      historyListEl.appendChild(span);
    }

    function addHistoryUI(text) {
      const li = document.createElement("li");
      li.textContent = text;
      historyListEl.insertBefore(li, historyListEl.firstChild);
    }

    function refreshHistoryUI() {
      historyListEl.innerHTML = "";

      for (let item of history.toReversed()) {
        const li = document.createElement("li");
        li.textContent = item;
        historyListEl.appendChild(li);
      }
    }

    function init() {
      const saved = load();

      pools = saved.pools 
        ? JSON.parse(saved.pools) 
        : structuredClone(fullPools);

      history = saved.history
        ? JSON.parse(saved.history)
        : [];

      if (history.length) {
        showQuestion(history.at(-1));
      }
      else {
        showPlaceholder();
      }

      refreshButtonText();
      refreshHistoryUI();
    }

    function pick(diff) {
      const pool = pools[diff];
      if (!pool.length) return null;

      if (pool.length > 1) {
        const last = pool.length - 1;
        const rand = Math.floor(Math.random() * pool.length);

        [pool[rand], pool[last]] = [pool[last], pool[rand]];
      }

      const result = pool.pop();
      history.push(result);
      
      save();
      showQuestion(result);
      refreshButtonText(diff);
      addHistoryUI(result);
    }

    function reset() {
      if (confirm("確定重置？")) {
        pools = structuredClone(fullPools);
        history = [];

        save();
        showPlaceholder();
        refreshButtonText();
        refreshHistoryUI();
      }
    }

    init();
  </script>
</body>

</html>
